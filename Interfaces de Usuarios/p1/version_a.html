<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mundo a trazos</title>
        <link rel="stylesheet" href="style/style_a.css">
    </head>

    <body>
    
        <header>
            <h1>Mundo a trazos</h1>
            <nav>
                <a href="#">Inicio</a>
                <a href="#">Experiencias</a>
                <a href="#">Consejos</a>
                <a href="#">Foro</a>
                <a href="#">Contacto</a>
            </nav>            
            <div class="logo"> 
                <img src="images/logo.jpg" alt="logo" class="logo-img">
                <select name="idioma" id="idioma">
                    <option value="español">ES</option>
                    <option value="frances">FR</option>
                    <option value="ingles">IN</option>
                    <option value="ingles">IT</option>
                </select>
            </div>
            
        </header>

         <main>
            <p><br></p>
            <div class="contenido-registro">
                <h2>Registro de Usuario</h2>
                <form action="version_b.html">
                    <label for="nombre">Nombre:</label><br>
                    <input type="text" id="nombre" name="nombre"><br><br>
                    <label for="apellido">Apellidos:</label><br>
                    <input type="text" id="apellido" name="apellido"><br><br>
                    <label for="email">Correo electrónico:</label><br>
                    <input type="email" id="email" name="email"><br><br>
                    <label for="email">Confirmación del correo:</label><br>
                    <input type="email" id="email2" name="email"><br><br>
                    <label for="birthday">Fecha de nacimiento:</label><br>
                    <input type="date" id="birthday" name="birthday"><br><br>
                    <label for="login">Usuario:</label><br>
                    <input type="text" id="login" name="login"><br><br>
                    <label for="pwd">Contraseña:</label><br>
                    <input type="password" id="pwd" name="pwd"><br><br>
                    <label for="image">Subir imagen de perfil:</label><br>
                    <input type="file" id="image" name="image"><br><br>
                    <input type="checkbox" id="politica_de_privacidad" name="politica de privacidad" value="politica de privacidad">
                    <label for="politica_de_privacidad">Acepto la <a href="#">Política de Privacidad</a></label><br><br>
                    <input type="submit" value="Guardar los datos y acceder" class="button">
                </form>
            </div>
            <p><br></p>
         </main>
         <br>

        <footer>
            <p>&#169; 2025 Mochileros Sin Fronteras</p>
            <div class="centro-footer">
                <nav class="center">
                    <a href="#">Sobre nosotros</a>
                    <a href="#">Política de Privacidad</a>
                    <a href="#">Ayuda</a>
                </nav>
                <div class="center">
                    <img src="images/instagram.png" alt="instagram" width="30" height="30">
                    <img src="images/tiktok.png" alt="tiktok" width="30" height="30">
                    <img src="images/facebook.png" alt="facebook" width="30" height="30">
                </div>
            </div>
            <div class="footer-newsletter">
                <h3>Suscríbete a nuestro newsletter</h3>
                <input type="email" id="email-footer" name="email" placeholder="Tu correo electrónico">
                <a href="#" class="button">Suscribirse</a>
            </div>
        </footer>

    </body>
</html>
